name: Get LinkedIn Token

on:
  workflow_dispatch:
    inputs:
      authorization_code:
        description: "Paste the code query param from the OAuth redirect (one-time)"
        required: true
        type: string

jobs:
  exchange:
    runs-on: ubuntu-latest
    steps:
      - name: Exchange auth code for access token
        env:
          CODE: ${{ github.event.inputs.authorization_code }}
          CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
        run: |
          RESPONSE=$(curl -s -S -X POST 'https://www.linkedin.com/oauth/v2/accessToken' \
            --data-urlencode 'grant_type=authorization_code' \
            --data-urlencode "code=${CODE}" \
            --data-urlencode 'redirect_uri=https://localhost' \
            --data-urlencode "client_id=${CLIENT_ID}" \
            --data-urlencode "client_secret=${CLIENT_SECRET}")
          echo "Raw response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print('access_token:', d.get('access_token','NOT_FOUND'))"
