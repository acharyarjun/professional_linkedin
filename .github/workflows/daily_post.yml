name: Daily LinkedIn Post

on:
  schedule:
    # GitHub `schedule` uses UTC only (no Europe/Madrid in cron).
    # 06:00 UTC = 07:00 in Europe/Madrid when offset is CET (UTC+1, roughly late Oct–late Mar).
    # For 07:00 during CEST (UTC+2, roughly late Mar–late Oct), use: cron: '0 5 * * *'
    # Post goes live when this job finishes — the LinkedIn UGC API does not support “publish at midnight”
    # from an earlier run; for ~midnight local posts, run the job near midnight instead (e.g. 23:00 UTC ≈ 00:00 CET).
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      day_number:
        description: 'Specific day number to post (1-500, leave empty for auto)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run - generate but do not publish'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  post:
    name: Generate and Publish Post
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decide if today should publish
        id: gate
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.day_number }}" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "manual_override=true" >> "$GITHUB_OUTPUT"
            echo "Manual day override provided; publish will run."
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "manual_override=false" >> "$GITHUB_OUTPUT"
            echo "Manual workflow dispatch without day override; publish will run."
            exit 0
          fi

          python3 scripts/schedule_publish_gate.py >> "$GITHUB_OUTPUT"
        env:
          SCHEDULE_SEED: ${{ vars.RANDOM_PUBLISH_SEED || 'industrial-ai-content-factory' }}
          DAYS_PER_WEEK: ${{ vars.RANDOM_PUBLISH_DAYS_PER_WEEK || '2' }}
          SCHEDULE_TIMEZONE: Europe/Madrid

      - name: Resolve dry run flag
        id: dryrun
        run: |
          DRY="${{ github.event.inputs.dry_run || secrets.DRY_RUN || 'false' }}"
          echo "dry_run=${DRY}" >> "$GITHUB_OUTPUT"

      - name: Skip publish on non-selected day
        if: steps.gate.outputs.should_publish != 'true'
        run: |
          echo "Skipping publish by weekly random schedule."
          echo "week=${{ steps.gate.outputs.selection_week }}"
          echo "selected_weekdays=${{ steps.gate.outputs.selection_weekdays }}"
          echo "today_weekday=${{ steps.gate.outputs.today_weekday }}"

      - name: Set up Python 3.11
        if: steps.gate.outputs.should_publish == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.gate.outputs.should_publish == 'true'
        run: pip install -r requirements.txt

      # LINKEDIN_MEMBER_SUB = OpenID id_token "sub" (same as local .env). Required if userinfo/me fail in CI.
      - name: Create .env file from GitHub Secrets
        if: steps.gate.outputs.should_publish == 'true'
        run: |
          cat > .env << EOF
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_EMAIL=${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD=${{ secrets.LINKEDIN_PASSWORD }}
          LINKEDIN_ACCESS_TOKEN=${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_MEMBER_SUB=${{ secrets.LINKEDIN_MEMBER_SUB }}
          CHROMA_PERSIST_DIR=./data/chroma
          POST_CALENDAR_PATH=./data/post_calendar.csv
          SCHEDULE_HOUR=12
          SCHEDULE_MINUTE=15
          TIMEZONE=Europe/Madrid
          CALENDAR_SEQUENCE_START=${{ vars.CALENDAR_SEQUENCE_START }}
          RANDOM_PUBLISH_TWICE_WEEKLY=${{ github.event_name == 'schedule' && 'true' || 'false' }}
          RANDOM_PUBLISH_DAYS_PER_WEEK=${{ vars.RANDOM_PUBLISH_DAYS_PER_WEEK || '2' }}
          RANDOM_PUBLISH_SEED=${{ vars.RANDOM_PUBLISH_SEED || 'industrial-ai-content-factory' }}
          USE_PUBLISH_CURSOR=true
          PUBLISH_CURSOR_PATH=./data/publish_cursor.json
          DRY_RUN=${{ steps.dryrun.outputs.dry_run }}
          EOF

      - name: Verify LinkedIn credentials
        if: steps.gate.outputs.should_publish == 'true' && steps.dryrun.outputs.dry_run != 'true'
        run: python main.py --test-linkedin

      - name: Run post pipeline
        if: steps.gate.outputs.should_publish == 'true'
        run: |
          if [ -n "${{ github.event.inputs.day_number }}" ]; then
            python main.py --run-now --day ${{ github.event.inputs.day_number }}
          else
            python main.py --run-now
          fi

      - name: Persist publish cursor to repository
        if: steps.gate.outputs.should_publish == 'true' && steps.dryrun.outputs.dry_run != 'true'
        run: |
          if [ ! -f data/publish_cursor.json ]; then
            echo "No cursor file to persist."
            exit 0
          fi

          if git diff --quiet -- data/publish_cursor.json; then
            echo "Cursor unchanged; nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/publish_cursor.json
          git commit -m "Update publish cursor [skip ci]"
          git push

      - name: Clean up .env
        if: always()
        run: rm -f .env
