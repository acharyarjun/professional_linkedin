name: Print LinkedIn OAuth URL

on:
  workflow_dispatch:

# Opens the authorization URL using repo secrets (client id is not printed — GitHub masks it).
# After Allow, copy the `code` query param from the redirect and run "Get LinkedIn Token" workflow.
jobs:
  url:
    runs-on: ubuntu-latest
    steps:
      - name: Print authorization URL
        env:
          CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
        run: |
          SCOPE="openid%20profile%20email%20w_member_social"
          REDIRECT="http%3A%2F%2F127.0.0.1%3A8765%2Foauth%2Fcallback"
          URL="https://www.linkedin.com/oauth/v2/authorization?response_type=code&client_id=${CLIENT_ID}&redirect_uri=${REDIRECT}&scope=${SCOPE}&state=professional_linkedin_oauth"
          echo "GitHub masks client_id in logs. Use local OAuth instead:"
          echo "  1. Put LINKEDIN_CLIENT_ID and LINKEDIN_CLIENT_SECRET in .env (LinkedIn Developer Portal)"
          echo "  2. python scripts/linkedin_oauth_local.py"
          echo "  3. python scripts/push_linkedin_secrets.py"
          echo ""
          echo "Or paste the authorization code into workflow: Get LinkedIn Token"
